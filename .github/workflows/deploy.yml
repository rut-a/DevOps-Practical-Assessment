name: ETL CI/CD Pipeline

on:
  push:
    branches:
      - main
    paths:
      - 'Module3/**'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install flake8

      - name: run linter
        run: flake8 etl/etl.py
  
  deploy:
    runs-on: ubuntu-latest
    needs: lint   

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: deploy to linux server and run ETL
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINUX_HOST }}
          username: ${{ secrets.LINUX_USER }}
          key: ${{ secrets.LINUX_SSH_KEY }}
          script: |
            set -e

            mkdir -p ~/deployed-etl
            cd ~/deployed-etl

            if [ ! -d .git ]; then
              git clone git@github.com:rut-a/DevOps-Practical-Assessment.git .
            else
              git pull origin main
            fi

            python3 etl/etl.py