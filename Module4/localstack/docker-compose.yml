services:
  localstack:
    image: localstack/localstack:3.0.2
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,sqs,lambda,iam
      - DEBUG=1
      - LAMBDA_IGNORE_ARCHITECTURE=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./volume:/var/lib/localstack   